[build]
builder = "RAILPACK"
buildCommand = "pnpm build:api"

[deploy]
# Apply the checked-in Prisma migrations before starting the HTTP process. This
# makes a failed database connection or pending schema change fail the deploy
# instead of leaving an apparently successful service behind a 502 gateway.
preDeployCommand = ["pnpm db:migrate:deploy"]
# Railway injects the port assigned to the running container. The API reads
# PORT before the local API_PORT fallback, so do not override it here.
startCommand = "pnpm --filter @apps/api start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
