name: Causal MVP

on:
  pull_request:
    paths:
      - ".github/workflows/causal-mvp.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - agent/causal-mvp

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @apps/api typecheck
      - run: pnpm --filter @apps/web typecheck
      - run: pnpm test:causal
