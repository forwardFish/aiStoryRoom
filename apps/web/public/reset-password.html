<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Reset password &middot; Our Many Worlds</title>
    <link rel="stylesheet" href="/platform.css" />
    <link rel="stylesheet" href="/auth-shared.css" />
    <link rel="stylesheet" href="/reset-password.css" />
    <link rel="stylesheet" href="/typography.css?v=20260717-1" />
    <link rel="stylesheet" href="/standard-page-header.css?v=20260720-1" />
  </head>
  <body class="mw-type-product">
    <standard-page-header back-href="/auth?mode=login" back-label="Back"></standard-page-header>
    <main class="reset-password-page" id="reset-password-app">
      <section class="page-frame auth-frame reset-password-frame" aria-labelledby="reset-password-title">
        <section class="auth-card reset-password-card">
          <h1 class="auth-title" id="reset-password-title">Choose a new password</h1>
          <p class="auth-subtitle">Create a strong password you have not used before. This secure link works only once.</p>
          <div class="notice" data-reset-notice hidden></div>
          <form data-reset-password-form novalidate>
            <label class="field">
              <span>New password</span>
              <input name="password" type="password" minlength="8" autocomplete="new-password" required />
              <small>Use at least 8 characters.</small>
            </label>
            <label class="field">
              <span>Confirm new password</span>
              <input name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
            </label>
            <button class="btn primary" type="submit">Update password</button>
          </form>
          <a class="text-link reset-password-back" href="/auth?mode=login">Back to login</a>
          <p class="auth-legal">This encrypted reset link expires automatically and can only be used once.</p>
        </section>
      </section>
    </main>
    <script type="module" src="/standard-page-header.js?v=20260720-1"></script>
    <script type="module" src="/reset-password.js"></script>
  </body>
</html>
