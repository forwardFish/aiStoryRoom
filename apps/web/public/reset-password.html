<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Reset password &middot; Many Worlds</title>
    <link rel="stylesheet" href="/platform.css" />
    <link rel="stylesheet" href="/reset-password.css" />
    <link rel="stylesheet" href="/auth-shared.css" />
  </head>
  <body>
    <main class="reset-password-page" id="reset-password-app">
      <span class="reset-password-glow glow-one" aria-hidden="true"></span>
      <span class="reset-password-glow glow-two" aria-hidden="true"></span>

      <section class="reset-password-shell" aria-labelledby="reset-password-title">
        <header class="reset-password-topbar">
          <a class="reset-password-brand" href="/" aria-label="Many Worlds home">Many Worlds</a>
          <span class="secure-context"><span aria-hidden="true"></span> Secure account recovery</span>
        </header>

        <section class="reset-password-card">
          <div class="security-badge" aria-hidden="true">
            <span class="security-lock"></span>
          </div>
          <div class="reset-password-heading">
            <p class="eyebrow">ACCOUNT SECURITY</p>
            <h1 id="reset-password-title">Choose a new password</h1>
            <p class="reset-password-copy">Create a strong password you have not used before. For your security, this link works only once.</p>
          </div>

          <div class="notice" data-reset-notice hidden></div>
          <form data-reset-password-form novalidate>
            <label class="field">
              <span>New password</span>
              <input name="password" type="password" minlength="8" autocomplete="new-password" required />
              <small>Use at least 8 characters.</small>
            </label>
            <label class="field">
              <span>Confirm new password</span>
              <input name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
            </label>
            <button class="btn primary" type="submit">Update password <span class="button-arrow" aria-hidden="true">&rarr;</span></button>
          </form>
          <a class="reset-password-back" href="/auth?mode=login&amp;reauth=1"><span aria-hidden="true">&larr;</span> Back to login</a>
        </section>

        <footer class="reset-password-meta">
          <span><i aria-hidden="true"></i> Encrypted connection</span>
          <span>This reset link expires automatically</span>
        </footer>
      </section>
    </main>
    <script type="module" src="/reset-password.js"></script>
  </body>
</html>
