<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Reset password · Many Worlds</title>
    <link rel="stylesheet" href="/platform.css" />
    <link rel="stylesheet" href="/reset-password.css" />
  </head>
  <body>
    <main class="reset-password-page" id="reset-password-app">
      <section class="reset-password-card">
        <a class="reset-password-brand" href="/" aria-label="Many Worlds home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Many Worlds</span>
        </a>
        <p class="eyebrow">ACCOUNT SECURITY</p>
        <h1>Reset your password</h1>
        <p class="reset-password-copy">Choose a new password for your account. This link can only be used once.</p>
        <div class="notice" data-reset-notice hidden></div>
        <form data-reset-password-form novalidate>
          <label class="field">
            <span>New password</span>
            <input name="password" type="password" minlength="8" autocomplete="new-password" required />
          </label>
          <label class="field">
            <span>Confirm new password</span>
            <input name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
          </label>
          <button class="btn primary" type="submit">Set new password</button>
        </form>
        <a class="reset-password-back" href="/auth">Back to login</a>
      </section>
    </main>
    <script type="module" src="/reset-password.js"></script>
  </body>
</html>
