<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Join Many Worlds</title></head><body><main><h1>Join Many Worlds</h1><p>Complete registration and the opening to qualify your inviter for 25 Bonus Credits.</p><p data-message></p><form data-join><input name="email" type="email" placeholder="Email" required><input name="password" type="password" minlength="8" placeholder="Password" required><input name="nickname" placeholder="Nickname"><button>Create invited account</button></form><label>Verification token <input data-token readonly></label><form data-verify><input name="email" type="email" placeholder="Email" required><input name="verificationToken" placeholder="Verification token" required><button>Verify</button></form><script type="module">import {apiFetch,setToken} from './js/api-client.js'; const ref=new URLSearchParams(location.search).get('ref')||''; const message=document.querySelector('[data-message]'); let pendingCredentials=null; document.querySelector('[data-join]').addEventListener('submit',async(e)=>{e.preventDefault(); try{const data=Object.fromEntries(new FormData(e.currentTarget)); data.referralCode=ref; const result=await apiFetch('/v4/auth/register',{method:'POST',body:JSON.stringify(data)}); pendingCredentials={email:data.email,password:data.password}; document.querySelector('[data-token]').value=result.verificationToken||''; document.querySelector('[data-verify] input[name="email"]').value=data.email; document.querySelector('[data-verify] input[name="verificationToken"]').value=result.verificationToken||''; message.textContent='Account created. Verify it, then complete the opening.';}catch(error){message.textContent=error.message;}}); document.querySelector('[data-verify]').addEventListener('submit',async(e)=>{e.preventDefault(); try{const verification=Object.fromEntries(new FormData(e.currentTarget)); await apiFetch('/v4/auth/verify',{method:'POST',body:JSON.stringify(verification)}); if(!pendingCredentials) throw new Error('Enter your account details again to continue.'); const session=await apiFetch('/v4/auth/login',{method:'POST',body:JSON.stringify(pendingCredentials)}); setToken(session.accessToken||session.token); location.href='./credits.html';}catch(error){message.textContent=error.message;}});</script></main></body></html>
